apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: salon-https-routes
  namespace: salon
spec:
  parentRefs:
    - name: salon-gateway
      sectionName: https

  hostnames:
    - "www.auracut.store"

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: 3001

    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-service
          port: 3002

    - matches:
        - path:
            type: PathPrefix
            value: /api/bookings
      backendRefs:
        - name: booking-service
          port: 3003

    - matches:
        - path:
            type: PathPrefix
            value: /api/reservations
      backendRefs:
        - name: reservation-service
          port: 3004

    - matches:
        - path:
            type: PathPrefix
            value: /api/promotions
      backendRefs:
        - name: promotion-service
          port: 3005

    - matches:
        - path:
            type: PathPrefix
            value: /api/notifications
      backendRefs:
        - name: notification-service
          port: 3006

    - matches:
        - path:
            type: PathPrefix
            value: /api/ai
      backendRefs:
        - name: ai-service
          port: 3007

    - matches:
        - path:
            type: PathPrefix
            value: /api/admin
      backendRefs:
        - name: admin-service
          port: 3008

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80