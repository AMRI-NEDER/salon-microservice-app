apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: salon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: myacr10.azurecr.io/notification-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3006
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          env:
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: NODE_ENV
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: NOTIFICATION_DB_URL
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: SMTP_PASS
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: SMTP_FROM
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
