apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: salon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
    spec:
      containers:
        - name: reservation-service
          image: myacr10.azurecr.io/reservation-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3004
          env:
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: NODE_ENV
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: RESERVATION_DB_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3