apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: salon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: myacr10.azurecr.io/frontend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "30m"
            limits:
              memory: "64Mi"
              cpu: "100m"