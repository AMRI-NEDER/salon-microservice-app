apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: salon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: myacr10.azurecr.io/ai-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3007
          resources:
            requests:
              memory: "192Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: NODE_ENV
            - name: USE_CLAUDE_API
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: USE_CLAUDE_API
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: salon-secrets
                  key: ANTHROPIC_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3