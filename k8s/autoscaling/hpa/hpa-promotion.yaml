apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: promotion-service-hpa
  namespace: salon
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: promotion-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80