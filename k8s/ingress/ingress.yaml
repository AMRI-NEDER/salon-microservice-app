apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: salon-ingress
  namespace: salon
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "2"
    nginx.ingress.kubernetes.io/limit-burst: "5"

spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - auracut.duckdns.org
      secretName: salon-tls

  rules:
    - host: auracut.duckdns.org
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001

          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3002

          - path: /api/bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 3003

          - path: /api/reservations
            pathType: Prefix
            backend:
              service:
                name: reservation-service
                port:
                  number: 3004

          - path: /api/promotions
            pathType: Prefix
            backend:
              service:
                name: promotion-service
                port:
                  number: 3005

          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3006

          - path: /api/ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 3007

          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 3008

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
