trigger:
  branches:
    include:
      - main
  paths:
    include:
      - user-service/*
      - user-service/**

pool:
  vmImage: ubuntu-latest

variables:
  ACR_NAME: myacr10
  ACR_LOGIN_SERVER: myacr10.azurecr.io
  AKS_RESOURCE_GROUP: salon-rg
  AKS_CLUSTER_NAME: salon-aks
  K8S_NAMESPACE: salon
  IMAGE_NAME: user-service
  IMAGE_TAG: v1.$(Build.BuildId)

stages:
- stage: Build_And_Deploy
  displayName: Build and Deploy user-service
  jobs:
  - job: BuildDeployUser
    displayName: BuildDeployUser
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Login to ACR
      inputs:
        azureSubscription: 'azure-connection-salon'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          ACR_NAME="$(ACR_NAME)"
          echo "Login to ACR: $ACR_NAME"
          az acr login --name "$ACR_NAME"

    - task: Bash@3
      displayName: Build Docker image
      inputs:
        targetType: inline
        script: |
          ACR_LOGIN_SERVER="$(ACR_LOGIN_SERVER)"
          IMAGE_NAME="$(IMAGE_NAME)"
          IMAGE_TAG="$(IMAGE_TAG)"

          echo "Building image: $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"
          docker build -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" ./user-service

    - task: Bash@3
      displayName: Push Docker image
      inputs:
        targetType: inline
        script: |
          ACR_LOGIN_SERVER="$(ACR_LOGIN_SERVER)"
          IMAGE_NAME="$(IMAGE_NAME)"
          IMAGE_TAG="$(IMAGE_TAG)"

          echo "Pushing image: $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"

    - task: AzureCLI@2
      displayName: Get AKS credentials
      inputs:
        azureSubscription: 'azure-connection-salon'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          AKS_RESOURCE_GROUP="$(AKS_RESOURCE_GROUP)"
          AKS_CLUSTER_NAME="$(AKS_CLUSTER_NAME)"

          echo "Getting AKS credentials for: $AKS_CLUSTER_NAME"
          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing

          kubectl get nodes

    - task: Bash@3
      displayName: Update user-service image
      inputs:
        targetType: inline
        script: |
          ACR_LOGIN_SERVER="$(ACR_LOGIN_SERVER)"
          IMAGE_NAME="$(IMAGE_NAME)"
          IMAGE_TAG="$(IMAGE_TAG)"
          K8S_NAMESPACE="$(K8S_NAMESPACE)"

          echo "Updating deployment/user-service"
          kubectl set image deployment/user-service \
            user-service="$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" \
            -n "$K8S_NAMESPACE"

    - task: Bash@3
      displayName: Verify rollout
      inputs:
        targetType: inline
        script: |
          K8S_NAMESPACE="$(K8S_NAMESPACE)"

          kubectl rollout status deployment/user-service -n "$K8S_NAMESPACE"
          kubectl get pods -n "$K8S_NAMESPACE" -l app=user-service