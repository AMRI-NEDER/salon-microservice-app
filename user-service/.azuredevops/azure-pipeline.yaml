trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  ACR_NAME: auracutacr
  ACR_LOGIN_SERVER: auracutacr.azurecr.io
  AKS_RESOURCE_GROUP: salon-rg
  AKS_CLUSTER_NAME: salon-aks
  K8S_NAMESPACE: salon
  IMAGE_TAG: v1.$(Build.BuildId)

stages:
- stage: Detect_Build_Deploy
  displayName: Detect, Build and Deploy changed services
  jobs:
  - job: SmartDeploy
    displayName: SmartDeploy
    steps:
    - checkout: self
      fetchDepth: 2

    - task: Bash@3
      displayName: Detect changed services
      inputs:
        targetType: inline
        script: |
          echo "Detecting changed files..."

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SERVICES=""

          echo "$CHANGED_FILES" | grep -q '^auth-service/' && SERVICES="$SERVICES auth-service"
          echo "$CHANGED_FILES" | grep -q '^user-service/' && SERVICES="$SERVICES user-service"
          echo "$CHANGED_FILES" | grep -q '^booking-service/' && SERVICES="$SERVICES booking-service"
          echo "$CHANGED_FILES" | grep -q '^reservation-service/' && SERVICES="$SERVICES reservation-service"
          echo "$CHANGED_FILES" | grep -q '^promotion-service/' && SERVICES="$SERVICES promotion-service"
          echo "$CHANGED_FILES" | grep -q '^notification-service/' && SERVICES="$SERVICES notification-service"
          echo "$CHANGED_FILES" | grep -q '^ai-service/' && SERVICES="$SERVICES ai-service"
          echo "$CHANGED_FILES" | grep -q '^admin-service/' && SERVICES="$SERVICES admin-service"

          SERVICES=$(echo "$SERVICES" | xargs)

          echo "Detected services: $SERVICES"

          echo "##vso[task.setvariable variable=CHANGED_SERVICES]$SERVICES"

    - task: AzureCLI@2
      displayName: Login to ACR
      condition: ne(variables['CHANGED_SERVICES'], '')
      inputs:
        azureSubscription: 'azure-connection-salon'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name "$(ACR_NAME)"

    - task: Bash@3
      displayName: Build and Push changed services
      condition: ne(variables['CHANGED_SERVICES'], '')
      inputs:
        targetType: inline
        script: |
          for SERVICE in $(CHANGED_SERVICES); do
            echo "-----------------------------------"
            echo "Building $SERVICE"
            docker build -t "$(ACR_LOGIN_SERVER)/$SERVICE:$(IMAGE_TAG)" ./$SERVICE

            echo "Pushing $(ACR_LOGIN_SERVER)/$SERVICE:$(IMAGE_TAG)"
            docker push "$(ACR_LOGIN_SERVER)/$SERVICE:$(IMAGE_TAG)"
          done

    - task: AzureCLI@2
      displayName: Get AKS credentials
      condition: ne(variables['CHANGED_SERVICES'], '')
      inputs:
        azureSubscription: 'azure-connection-salon'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials \
            --resource-group "$(AKS_RESOURCE_GROUP)" \
            --name "$(AKS_CLUSTER_NAME)" \
            --overwrite-existing

          kubectl get nodes

    - task: Bash@3
      displayName: Deploy changed services
      condition: ne(variables['CHANGED_SERVICES'], '')
      inputs:
        targetType: inline
        script: |
          for SERVICE in $(CHANGED_SERVICES); do
            echo "-----------------------------------"
            echo "Deploying $SERVICE"

            kubectl set image deployment/$SERVICE \
              $SERVICE="$(ACR_LOGIN_SERVER)/$SERVICE:$(IMAGE_TAG)" \
              -n "$(K8S_NAMESPACE)"

            kubectl rollout status deployment/$SERVICE -n "$(K8S_NAMESPACE)"
          done

    - task: Bash@3
      displayName: No changed service
      condition: eq(variables['CHANGED_SERVICES'], '')
      inputs:
        targetType: inline
        script: |
          echo "No microservice changes detected. Nothing to build or deploy."