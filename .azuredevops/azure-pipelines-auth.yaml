trigger:
  branches:
    include:
      - main
  paths:
    include:
      - auth-service/*
      - auth-service/**

pool:
  vmImage: ubuntu-latest

variables:
  ACR_NAME: myacr10
  ACR_LOGIN_SERVER: myacr10.azurecr.io
  AKS_RESOURCE_GROUP: salon-rg
  AKS_CLUSTER_NAME: salon-aks
  K8S_NAMESPACE: salon
  IMAGE_NAME: auth-service
  IMAGE_TAG: $(Build.BuildId)

stages:
- stage: BuildAndPush
  displayName: Build and Push auth-service
  jobs:
  - job: BuildPushAuth
    displayName: Build and Push auth-service image
    steps:
    - task: AzureCLI@2
      displayName: Login to ACR
      inputs:
        azureSubscription: 'YOUR-SERVICE-CONNECTION'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(ACR_NAME)

    - task: Bash@3
      displayName: Build Docker image
      inputs:
        targetType: inline
        script: |
          docker build -t $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG) ./auth-service

    - task: Bash@3
      displayName: Push Docker image
      inputs:
        targetType: inline
        script: |
          docker push $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)

- stage: Deploy
  displayName: Deploy auth-service to AKS
  dependsOn: BuildAndPush
  jobs:
  - job: DeployAuth
    displayName: Update auth-service deployment
    steps:
    - task: AzureCLI@2
      displayName: Get AKS credentials
      inputs:
        azureSubscription: 'YOUR-SERVICE-CONNECTION'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials \
            --resource-group $(AKS_RESOURCE_GROUP) \
            --name $(AKS_CLUSTER_NAME) \
            --overwrite-existing

    - task: Bash@3
      displayName: Update auth-service image
      inputs:
        targetType: inline
        script: |
          kubectl set image deployment/auth-service \
            auth-service=$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG) \
            -n $(K8S_NAMESPACE)

    - task: Bash@3
      displayName: Verify rollout
      inputs:
        targetType: inline
        script: |
          kubectl rollout status deployment/auth-service -n $(K8S_NAMESPACE)
          kubectl get pods -n $(K8S_NAMESPACE) -l app=auth-service